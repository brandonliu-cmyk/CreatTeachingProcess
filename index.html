      {
        id: 'demo-u1',
        title: '第一单元（示例）',
        children: [
          { id: 'demo-1', title: '1 示例课文 A', page: 'P.1', kind: 'lesson' },

    function getCatalogTree(versionId, gradeVolumeId) {
      if (versionId === 'bb' && gradeVolumeId === 'g6x') return CATALOG_BB_G6X;
      return CATALOG_MOCK_FALLBACK;
    }

    function pickFirstLeafInNodes(nodes, parentGroup = null) {
      if (!nodes || !nodes.length) return null;
      for (const n of nodes) {
        if (n.children && n.children.length) {
          const inner = pickFirstLeafInNodes(n.children, n);
          if (inner) return inner;
        } else return { node: n, parentGroup };
      }
      return null;
    }

    function pickFirstLeafFromTree(tree) {
      for (const unit of tree) {
        const res = pickFirstLeafInNodes(unit.children, null);
        if (res) return { node: res.node, unitTitle: unit.title, unitId: unit.id, parentGroup: res.parentGroup };
      }
      return { node: null, unitTitle: '', unitId: '', parentGroup: null };
    }

    function buildExpandedDefaults(versionId, gradeVolumeId) {
      const tree = getCatalogTree(versionId, gradeVolumeId);
      const s = new Set(tree.map((u) => u.id));
      if (versionId === 'bb' && gradeVolumeId === 'g6x') {
        ['u1-3', 'u4-10', 'u5-14', 'u3-s0'].forEach((id) => s.add(id));
      }
      return s;
    }

    function formatCatalogLessonLine(gradeVolumeId, unitTitle, node) {
      const gv = GRADE_VOLUMES.find((g) => g.id === gradeVolumeId)?.label || '';
      const page = node.page ? ` ${node.page}` : '';
      return `${gv} · ${unitTitle} · ${node.title}${page}`;
    }

    // ─── UTILITY COMPONENTS ──────────────────────────────────────────────────
    function SkeletonLine({ width = "100%", height = "16px", className = "" }) {
      return <div className={`shimmer rounded ${className}`} style={{ width, height }} />;
    }

    function LoadingSpinner({ size = 24, color = "border-blue-500" }) {
      return (
        <div className={`w-${size/4} h-${size/4} border-2 border-gray-200 border-t-${color.replace('border-','')} rounded-full spin-dot`} 
             style={{ width: size, height: size, borderTopColor: '#3B82F6', borderColor: '#E5E7EB' }} />
      );
    }

    function catalogKindPrefix(kind) {
      if (kind === 'oral' || kind === 'writing') return '◎ ';
      if (kind === 'reading') return '📚 ';
      if (kind === 'garden') return '🌿 ';
      if (kind === 'project') return '◇ ';
      if (kind === 'sample' || kind === 'sampleGroup') return '◇ ';
      if (kind === 'poem') return '◆ ';
      return '';
    }

    function CatalogTreeRows({ units, unit, depth, expandedIds, onToggle, selectedId, onSelectLeaf, parentGroupNode = null }) {
      return units.map((node) => {
        const hasChildren = node.children && node.children.length;
        const isOpen = !hasChildren || expandedIds.has(node.id);
        const prefix = catalogKindPrefix(node.kind);
        const star = node.star ? <span className="text-amber-500"> *</span> : null;
        return (
          <React.Fragment key={node.id}>
            <button
              type="button"
              className={`w-full flex items-start gap-1 py-1.5 pr-1 rounded-lg text-left transition ${
                selectedId === node.id
                  ? 'bg-blue-50 text-blue-900'
                  : 'text-gray-600 hover:bg-gray-50'
              }`}
              style={{ paddingLeft: 6 + depth * 12 }}
              onClick={() => {
                if (hasChildren) onToggle(node.id);
                else onSelectLeaf(node, unit, parentGroupNode);
              }}
            >
              <span
                className="text-gray-400 flex-shrink-0 w-4 h-4 flex items-center justify-center mt-0.5"
                onClick={(e) => {
                  if (!hasChildren) return;
                  e.stopPropagation();
                  onToggle(node.id);
                }}
              >
                {hasChildren ? (isOpen ? <Icons.CHEVRON_DOWN /> : <Icons.CHEVRON_RIGHT />) : <span className="w-1 h-1 rounded-full bg-gray-300 inline-block" />}
              </span>
              <span className="text-xs leading-snug flex-1 min-w-0">
                <span className="text-amber-600">{prefix}</span>
                {node.title}
                {star}
                {node.page ? <span className="text-gray-400 ml-1">{node.page}</span> : null}
              </span>
            </button>
            {hasChildren && isOpen ? (
              <CatalogTreeRows
                units={node.children}
                unit={unit}
                depth={depth + 1}
                expandedIds={expandedIds}
                onToggle={onToggle}
                selectedId={selectedId}
                onSelectLeaf={onSelectLeaf}
                parentGroupNode={node}
              />
            ) : null}
          </React.Fragment>
        );
      });
    }

    function CourseCatalogSidebar({
      versionId,
      gradeVolumeId,
      onVersionChange,
      onGradeVolumeChange,
      expandedIds,
      onToggleExpand,
      selectedLeafId,
      onSelectLeaf,
      collapsed,
      onToggleCollapse,
    }) {
      const tree = getCatalogTree(versionId, gradeVolumeId);
      const vName = TEXTBOOK_VERSIONS.find((v) => v.id === versionId)?.name || '';
      const gv = GRADE_VOLUMES.find((g) => g.id === gradeVolumeId)?.label || '';

      return (

    /** 目录标题 → 与 book/ 下映射的课文名对齐 */
    function normalizeCatalogTitleForBook(raw) {
      if (!raw) return '';
      let t = raw.replace(/^\d+\s+/, '').trim();
      t = t.replace(/（[^）]*）/g, '').trim();
      return t;
    }

    /** 当前选中目录节点对应哪条课文（子课文用父篇名，如「寒食」→「古诗三首」） */
    function getLessonKeyForImages(node, parentGroupNode) {
      if (!node) return '';
      if ((node.kind === 'sub' || node.kind === 'sample') && parentGroupNode) {
        return normalizeCatalogTitleForBook(parentGroupNode.title);
      }
      if (node.kind === 'oral' || node.kind === 'writing' || node.kind === 'reading') {
        const p = node.title.split('：')[0];
        return (p || node.title).trim();
      }
      if (node.kind === 'project') {
        const p = node.title.split('：')[0];
        return (p || node.title).trim();
      }
      return normalizeCatalogTitleForBook(node.title);
    }

    function getLessonKeyForKnowledgePoints(node, parentGroupNode) {
      if (!node) return '';
      if (node.kind === 'sub' && parentGroupNode) {
        return normalizeCatalogTitleForBook(parentGroupNode.title);
      }
      return normalizeCatalogTitleForBook(node.title);
    }

    function getImagesForLesson(lessonTitle, unitId) {
      const entry = BOOK_IMAGES.find((e) => e.name === lessonTitle && e.unitId === unitId);
      if (!entry || !entry.files.length) return [];
      return entry.files.map((f) => ({ name: entry.name, src: `${BOOK_IMG_DIR}/${f}` }));
    }

    function getBookImagesForCatalogNode(node, parentGroupNode, catalogUnitId) {
      const key = getLessonKeyForImages(node, parentGroupNode);
      return getImagesForLesson(key, catalogUnitId || '');
    }

- **截然不同**：形容两件事物毫无共同之处。结合语境：突出了初一与除夕的不同光景，初一全城休息，除夕热闹非凡。

- **残灯末庙**：指农历正月十九，春节的最后一个节日，比喻事情接近尾声。结合语境：表明春节即将结束。

## 三、课文结构分析
本文以**时间为线索**，按照“腊八→小年（腊月二十三）→除夕→初一→初六→元宵→正月十九”的顺序展开，分为以下部分：
| 段落范围 | 时间段 | 主要内容 | 情感/作用说明 |
|---|---|---|---|
| 第①段 | 腊月的初旬（腊八） | 描写腊八节熬腊八粥、泡腊八蒜的习俗 | 体现春节的开始与人们的迎春热情 |
| 第②段 | 腊八之后到腊月二十三 | 铺户加紧上货，街上增加货摊子，孩子们准备过年的三件事（买杂拌儿、爆竹、玩意儿），大人们预备过年用品 | 展现春节前的忙碌与孩子们的喜悦 |
| 第③段 | 腊月二十三（小年） | 描写祭灶王、吃麦芽糖与江米糖的习俗 | 过春节的“彩排”，体现民俗风情 |
| 第④段 | 腊月二十三到除夕前 | 描写贴春联、扫房、预备年菜的习俗 | 突出春节前的紧张与忙碌 |
| 第⑤段 | 除夕 | 描写做年菜、穿新衣、贴对联、放鞭炮、吃团圆饭、守岁的场景 | 展现除夕的热闹非凡与家庭团圆的温馨 |
| 第⑥段 | 初一 | 描写铺户休息、男人们拜年、女人们待客、孩子们逛庙会的场景 | 呈现初一的安静与休闲，与除夕形成对比 |
| 第⑦段 | 初六 | 描写铺户开张、放鞭炮、伙计逛庙会的场景 | 体现春节后的恢复与延续 |

| 第⑨段 | 正月十九 | 描写春节结束，人们恢复正常生活 | 点明春节的时间范围，表达对春节的怀念 |

## 四、重点句段赏析（核心考点）
### 1. 中心句/写景句/写人句赏析
- **句段1**：“这不是粥，而是小型的农业产品展览会。”（第①段）
  - **修辞**：比喻（把腊八粥比作农业产品展览会）
  - **表达效果**：生动形象地写出了腊八粥中米、豆、干果的种类繁多，体现了农业社会的丰收成果，突出了人们的自傲心理。
  - **作用说明**：表现了腊八节的独特习俗，为下文描写春节的热闹场景做铺垫。

- **句段2**：“除夕真热闹。家家赶做年菜，到处是酒肉的香味。老少男女都穿起新衣，门外贴好红红的对联，屋里贴好各色的年画，哪一家都灯火通宵，不许间断，鞭炮声日夜不绝。”（第⑤段）
  - **描写手法**：环境描写、场面描写
  - **表达效果**：从嗅觉（酒肉的香味）、视觉（新衣、对联、年画、灯火）、听觉（鞭炮声）三个方面描绘了除夕的热闹场景，展现了家庭团圆的温馨与节日的喜庆。
  - **作用说明**：点明“除夕真热闹”的中心，使读者有身临其境的感觉。

- **句段3**：“有名的老铺都要挂出几百盏灯来：有的一律是玻璃的，有的清一色是牛角的，有的都是纱灯；有的通通彩绘《红楼梦》或《水浒传》故事，有的图案各式各样。”（第⑧段）
  - **修辞**：排比（“有的……有的……有的……”）
  - **表达效果**：通过排比句式，详细列举了老铺挂出的各种灯的类型，突出了元宵节灯的数量多、种类丰富，展现了节日的繁华与美丽。
  - **作用说明**：体现了元宵节作为春节又一个高潮的特点，吸引读者的阅读兴趣。

### 2. 特殊句式解析
- **句段**：“孩子们喜欢吃这些零七八碎儿，即使没有饺子吃，也必须买杂拌儿。”（第②段）
  - **句式**：假设复句（“即使……也……”）
  - **表达效果**：突出了孩子们对杂拌儿的喜爱程度，哪怕没有饺子吃，也要买杂拌儿，体现了春节期间孩子们的快乐与满足。

## 五、写作手法总结
### 1. 时间顺序
- **举例**：按照“腊八→小年→除夕→初一→初六→元宵→正月十九”的时间顺序描写春节的习俗。
- **迁移价值**：在写作中，采用时间顺序可以使文章结构清晰，条理分明，便于读者理解事件的发展过程。

### 2. 详略得当
- **举例**：详细描写了腊八、小年、除夕、初一、元宵的习俗，简略描写了初六、正月十九的场景。
- **迁移价值**：在写作中，根据主题的需要，对重要内容进行详细描写，对次要内容进行简略处理，可以突出重点，增强文章的感染力。

### 3. 修辞手法的运用
- **举例**：比喻（腊八粥比作农业产品展览会）、排比（元宵节灯的描写）、拟人（“除夕噼里啪啦大笑着走来，又噼里啪啦大笑着离去”）。
- **迁移价值**：在写作中，合理运用修辞手法可以使文章更加生动形象，增强语言的表现力。

### 4. 对比手法
- **举例**：除夕的热闹与初一的安静形成对比，突出了春节期间不同时间的光景特点。
- **迁移价值**：在写作中，运用对比手法可以突出事物的特点，增强文章的说服力。

### 5. 细节描写
- **举例**：描写腊八蒜“色如翡翠，醋也有了些辣味，色味双美”，展现了腊八蒜的特点。
- **迁移价值**：在写作中，通过细节描写可以使文章更加具体生动，让读者有身临其境的感觉。

## 六、拓展积累
### 1. 主题词语积累
- 春节习俗：腊八粥、腊八蒜、祭灶王、贴春联、扫房、吃团圆饭、守岁、拜年、逛庙会、吃元宵
- 节日氛围：热闹非凡、灯火通宵、鞭炮声日夜不绝、悬灯结彩、火炽而美丽

### 2. 相关诗句或文化延伸
- **诗句**：“爆竹声中一岁除，春风送暖入屠苏。千门万户曈曈日，总把新桃换旧符。”（王安石《元日》）
- **文化延伸**：春节是中国最重要的传统节日，具有悠久的历史和丰富的民俗文化。不同地区的春节习俗略有不同，但都表达了人们对新年的美好祝愿与对生活的热爱。

### 3. 思想主题拓展
- 本文通过描写老北京春节的习俗，展现了传统文化的魅力，表达了对生活的赞美与对未来的期待。在现代社会，虽然一些传统习俗可能发生了变化，但春节仍然是人们团聚、交流、庆祝的重要节日。

### 4. 与阅读链接的对比
- **老舍《北京的春节》**：以时间为线索，详细描写了北京春节的习俗，语言口语化、富有“京味儿”。
- **斯好《除夕》**：通过回忆的方式，描写了闽南老家腊月二十九围炉的习俗，语言细腻、充满情感。
- **不同之处**：《北京的春节》是全景式的描写，展现了春节的整个过程；《除夕》则是特写式的描写，重点刻画了围炉的场景。此外，两者的语言风格也有所不同，《北京的春节》更口语化，《除夕》更细腻情感化。`
    };

                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                          {/* 按题目查看 */}
                          <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col">
                              <h4 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                  <span className="text-blue-500"><Icons.GRID /></span>
                                  按题目查看完成情况
                              </h4>
                              <div className="space-y-4 flex-1">
                                  {[
                                      { title: '1. 查阅资料，了解作者生平', rate: 95, color: 'bg-emerald-500' },
                                      { title: '2. 生字词拼音标注', rate: 65, color: 'bg-rose-500' },
                                      { title: '3. 概括"春天的图画"', rate: 82, color: 'bg-amber-500' },
                                      { title: '4. 优美句子赏析', rate: 88, color: 'bg-blue-500' }
                                  ].map((q, idx) => (
                                      <div key={idx}>
                                          <div className="flex justify-between text-xs mb-1.5">
                                              <span className="text-gray-700 font-medium truncate pr-2">{q.title}</span>
                                              <span className="text-gray-500 font-medium">{q.rate}% 正确率</span>
                                          </div>
                                          <div className="w-full bg-gray-100 rounded-full h-2">
                                              <div className={`${q.color} h-2 rounded-full`} style={{ width: `${q.rate}%` }}></div>
                                          </div>
                                      </div>
                                  ))}
                              </div>
                              <button className="w-full mt-4 py-2 text-sm text-blue-600 hover:bg-blue-50 rounded-lg transition-colors border border-blue-100">
                                  查看所有题目
                              </button>
                          </div>

                          {/* 按学生查看 */}
                          <div className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col">
                              <h4 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                  <span className="text-emerald-500"><Icons.STUDENT /></span>
                                  按学生查看完成情况
                              </h4>
                              <div className="space-y-3 flex-1">
                                  <div className="flex justify-between items-center text-xs text-gray-500 border-b border-gray-100 pb-2">
                                      <span>姓名</span>
                                      <div className="flex-1 flex justify-center"><span>状态</span></div>
                                      <span className="w-16 text-right">得分/正确率</span>
                                  </div>
                                  {[
                                      { name: '李华', status: '已提交', score: '95%', statusColor: 'text-emerald-600 bg-emerald-50' },
                                      { name: '王明', status: '已提交', score: '88%', statusColor: 'text-emerald-600 bg-emerald-50' },
                                      { name: '张强', status: '已提交', score: '45%', statusColor: 'text-amber-600 bg-amber-50', note: '需关注' },
                                      { name: '赵雪', status: '未提交', score: '-', statusColor: 'text-rose-600 bg-rose-50' },
                                  ].map((stu, idx) => (
                                      <div key={idx} className="flex justify-between items-center text-sm">
                                          <span className="text-gray-700 font-medium flex items-center gap-2 w-24">
                                              <div className="w-6 h-6 rounded-full bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center text-[10px] text-blue-700 flex-shrink-0">{stu.name[0]}</div>
                                              <span className="truncate">{stu.name}</span>
                                          </span>
                                          <div className="flex items-center gap-2 flex-1 justify-center">
                                              <span className={`text-xs px-2 py-0.5 rounded-full whitespace-nowrap ${stu.statusColor}`}>{stu.status}</span>
                                              {stu.note && <span className="text-[10px] bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded-full whitespace-nowrap">{stu.note}</span>}
                                          </div>
                                          <span className="text-gray-600 font-medium w-16 text-right">{stu.score}</span>
                                      </div>
                                  ))}
                              </div>
                              <button className="w-full mt-4 py-2 text-sm text-blue-600 hover:bg-blue-50 rounded-lg transition-colors border border-blue-100">
                                  查看完整名单 (40人)
                              </button>
                          </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── STEP 2: 课中授课 ───────────────────────────────────────────────
    function StepInClass({ selectedTools, setSelectedTools, wizardMode, onNextStep, generationStatus, setGenerationStatus, catalogSubject }) {
      const planA = ['t_ppt', 't_test'];
      const planB = ['t_ppt', 'act_template', 'act_lottery', 't_test'];
      const [selectedPlan, setSelectedPlan] = useState(null);
      const [viewMode, setViewMode] = useState(wizardMode === 'existing' ? 'preview' : 'select'); // 'select' | 'preview'
      const [currentPreviewTool, setCurrentPreviewTool] = useState(null);
      const [activeSlideIndex, setActiveSlideIndex] = useState(0);

      const [isGeneratingAll, setIsGeneratingAll] = useState(false);
      const [showPlanModal, setShowPlanModal] = useState(false);
      const [modalSelectedTools, setModalSelectedTools] = useState([]);
      const [showAnalysisModal, setShowAnalysisModal] = useState(false);
      const [activeAIPopup, setActiveAIPopup] = useState(null);
      const [previewModalData, setPreviewModalData] = useState(null);

      const studyGuideSlides = Array.from({ length: 13 }, (_, i) => ({
        type: 'image',
        title: `交互课件截图 ${i + 1}`,
        url: `book/北京的春节${i + 1}.png`
      }));

      // 初始化生成状态
      useEffect(() => {
        setGenerationStatus(prev => {
          const newStatus = { ...prev };
          let changed = false;
          selectedTools.forEach(tool => {
            if (!newStatus[tool.instanceId]) {
              newStatus[tool.instanceId] = 'idle';
              changed = true;
            }
          });
          return changed ? newStatus : prev;
        });
      }, [selectedTools]);

      const [openDropdown, setOpenDropdown] = React.useState(null);
      const [hoveredActivity, setHoveredActivity] = React.useState(null);
      const [dropdownPos, setDropdownPos] = React.useState({ top: 0, left: 0 });

      const [activeCardMenu, setActiveCardMenu] = React.useState(null);
      const [cardMenuPos, setCardMenuPos] = React.useState({ top: 0, left: 0 });

      const handleCardMenuToggle = (uniqueId, e) => {
        e.stopPropagation();
        if (activeCardMenu === uniqueId) {
          setActiveCardMenu(null);
        } else {
          const rect = e.currentTarget.getBoundingClientRect();
          // Adjust position to show above or below based on space, and align right
          setCardMenuPos({ top: rect.bottom + 4, left: rect.right - 160 });
          setActiveCardMenu(uniqueId);
        }
      };

      const openToolPage = (toolId, subId, instanceId) => {
        const base = window.location.origin + window.location.pathname;
        const params = new URLSearchParams();
        params.set('createTool', subId);
        if (instanceId) params.set('instanceId', instanceId);
        window.open(`${base}?${params.toString()}`, '_blank',
          'width=800,height=700,left=' + (screen.width - 800) / 2 + ',top=' + (screen.height - 700) / 2);
        setOpenDropdown(null);
      };

      const dropdownRef = useRef(null);

      const handleDropdownToggle = (itemId, e) => {
        if (openDropdown === itemId) {
          setOpenDropdown(null);
        } else {
          const rect = e.currentTarget.getBoundingClientRect();
          setDropdownPos({ top: rect.bottom + 4, left: rect.left });
          setOpenDropdown(itemId);
        }
      };

      useEffect(() => {
        if (!openDropdown && !activeCardMenu) return;
        const handler = (e) => {
          if (!e.target.closest('[data-dropdown-trigger]') && !e.target.closest('[data-dropdown-menu]') && !e.target.closest('[data-card-menu-trigger]')) {
            setOpenDropdown(null);
            setActiveCardMenu(null);
          }
        };
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, [openDropdown, activeCardMenu]);

      const handlePlanSelectAndGenerate = async (plan) => {
        setShowPlanModal(false);
        // 使用 instanceId，并标记为自动生成
        const newTools = plan.map(id => ({ 
          id, 
          instanceId: `${id}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
          autoGenerate: true
        }));
        
        const autoIds = newTools.map(t => t.instanceId);

        setGenerationStatus(prev => {
          const next = { ...prev };
          autoIds.forEach(id => next[id] = 'generating');
          return next;
        });

        autoIds.forEach(id => {
          const delay = Math.floor(Math.random() * 10000) + 5000; // 5~15s随机时间
          setTimeout(() => {
            setGenerationStatus(prev => {
              const next = { ...prev };
              if (next[id] === 'generating') {
                next[id] = 'completed';
              }
              return next;
            });
          }, delay);
        });

        const nextSelected = [...selectedTools, ...newTools];
        setSelectedTools(nextSelected);
      };

      const handleSingleGenerate = async (id, e) => {
        e.stopPropagation();
        setGenerationStatus(prev => ({ ...prev, [id]: 'generating' }));
        const delay = Math.floor(Math.random() * 10000) + 5000;
        await new Promise(resolve => setTimeout(resolve, delay));
        setGenerationStatus(prev => ({ ...prev, [id]: 'completed' }));
      };
      const handleGenerateAll = async () => {
        if (selectedToolList.length === 0) {
          setShowPlanModal(true);
          setModalSelectedTools([]);
          return;
        }
        
        setIsGeneratingAll(true);
        const toolsToGenerate = selectedTools.filter(tool => generationStatus[tool.instanceId] !== 'completed');
        
        setGenerationStatus(prev => {
          const next = { ...prev };
          toolsToGenerate.forEach(tool => next[tool.instanceId] = 'generating');
          return next;
        });

        await Promise.all(toolsToGenerate.map(tool => {
          const delay = Math.floor(Math.random() * 10000) + 5000;
          return new Promise(resolve => {
            setTimeout(() => {
              setGenerationStatus(prev => ({ ...prev, [tool.instanceId]: 'completed' }));
              resolve();
            }, delay);
          });
        }));
        
        setIsGeneratingAll(false);
      };

      const addToolInstance = (id) => {
        const createdAt = Date.now();
        const instanceId = `${id}_${createdAt}_${Math.random().toString(36).substr(2, 9)}`;
        setSelectedTools(prev => [...prev, { id, instanceId, createdAt }]);
        setGenerationStatus(prev => prev[instanceId] ? prev : { ...prev, [instanceId]: 'idle' });
        return instanceId;
      };

      const toggleTool = (id) => {
        const instanceId = addToolInstance(id);
        // 设置为生成中状态（校本资源除外）
        if (id !== 't_school') {
            setGenerationStatus(prev => ({ ...prev, [instanceId]: 'generating' }));
            const delay = Math.floor(Math.random() * 10000) + 5000;
            setTimeout(() => {
                setGenerationStatus(prev => ({ ...prev, [instanceId]: 'completed' }));
            }, delay);
        } else {
            setGenerationStatus(prev => ({ ...prev, [instanceId]: 'completed' }));
        }
        return instanceId;
      };

      const handleAddToolWithMode = (toolId, mode) => {
        const instanceId = toggleTool(toolId);
        setOpenDropdown(null);
        
        // 处理特定模式的跳转/操作
        if (mode === 'upload') {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = (e) => {
                if (e.target.files.length > 0) {
                    alert('已选择文件: ' + e.target.files[0].name);
                    handleOpenToolPreview(instanceId, toolId, 'config');
                }
            };
            input.click();
        } else if (mode === 'config') {
            handleOpenToolPreview(instanceId, toolId, 'config');
        } else if (mode === 'new_tab') {
            handleOpenToolPreview(instanceId, toolId, 'new_tab');
        }
      };

      const removeTool = (instanceId) => {
        setSelectedTools(selectedTools.filter(t => t.instanceId !== instanceId));
      };

      // 将选中的 ID 映射回带有具体信息的列表对象
      const selectedToolList = selectedTools.map((selectedTool, index) => {
        const { id: selectedId, instanceId, createdAt } = selectedTool;
        let matchedTool = MOCK_DATA.inClassTools.find(t => t.id === selectedId);
        
        let toolData = null;
        if (matchedTool) {
          toolData = { ...matchedTool, typeName: matchedTool.name, uniqueId: instanceId };
        } else {
          // 尝试匹配带有子选项的工具
          for (const t of MOCK_DATA.inClassTools) {
            if (t.options) {
              const opt = t.options.find(o => o.subId === selectedId);
              if (opt) {
                toolData = { ...t, id: opt.subId, typeName: opt.name, parentName: t.name, uniqueId: instanceId, parentId: t.id };
                break;
              }
            }
          }
        }
        
        if (toolData) {
          const serial = selectedTools.slice(0, index + 1).filter(t => t.id === selectedId).length;
          const defaultNodeName = '北京的春节';
          toolData.name = `${defaultNodeName} - ${toolData.typeName} ${serial}`;
          toolData.createdAt = createdAt;
          return toolData;
        }
        return null;
      }).filter(Boolean);

      const handleOpenToolPreview = (uniqueId, originalToolId, mode = null) => {
        const status = generationStatus[uniqueId] || 'idle';
        if (originalToolId === 't_lesson_plan' && mode === 'config') {
          window.open('img/教案配置.png', '_blank');
          return;
        }
        if (originalToolId === 't_learning_plan' && mode === 'config') {
          window.open('img/学案编辑.png', '_blank');
          return;
        }
        if (originalToolId === 't_ppt' && mode === 'config') {
          window.open('img/kejian.png', '_blank');
          return;
        }
        if ((originalToolId === 't_lesson_plan' || originalToolId === 't_learning_plan') && mode === 'config') {
          // 使用统一的预览/配置弹窗
          setPreviewModalData({
            toolId: originalToolId,
            status,
            instanceId: uniqueId,
            mode
          });
          return;
        }
        if (originalToolId === 't_lesson_plan' && status === 'completed') {
          window.open('img/教案预览.png', '_blank');
          return;
        }
        if (originalToolId === 'act_ai' && status !== 'completed') {
          window.open('img/AI活动.png', '_blank');
          return;
        }
        if (originalToolId === 'act_lottery' && status === 'completed') {
          window.open('img/抽奖.png', '_blank');
          return;
        }
        if (originalToolId === 't_test' && mode === 'config') {
          window.open(`?previewTool=t_test&mode=config&instanceId=${uniqueId}`, '_blank');
          return;
        }
        if (originalToolId === 't_agent' && status !== 'completed') {
          window.open('img/智能体配置.png', '_blank');
          return;
        }
        if (originalToolId === 't_dictation') {
          if (mode === 'config') {
            setPreviewModalData({
              toolId: originalToolId,
              status,
              instanceId: uniqueId,
              mode
            });
          } else {
            window.open('img/听写预览.png', '_blank');
          }
          return;
        }
        if (originalToolId === 't_oral') {
          window.open('img/口语老师预览.png', '_blank');
          return;
        }
        if (originalToolId === 'oral_word' && mode === 'config') {
          setPreviewModalData({ toolId: originalToolId, status, instanceId: uniqueId, mode });
          return;
        }
        if (originalToolId === 'oral_dialog' && mode === 'config') {
          setPreviewModalData({ toolId: originalToolId, status, instanceId: uniqueId, mode });
          return;
        }
        if (originalToolId === 'oral_scene' && mode === 'config') {
          setPreviewModalData({ toolId: originalToolId, status, instanceId: uniqueId, mode });
          return;
        }
        if (originalToolId === 'oral_corpus' && mode === 'new_tab') {
          window.open('img/单词评测配置.png', '_blank');
          return;
        }
        if (originalToolId.startsWith('oral_') && !mode) {
          window.open('img/口语老师预览.png', '_blank');
          return;
        }
        setPreviewModalData({
          toolId: originalToolId,
          status,
          instanceId: uniqueId,
          mode
        });
      };

      useEffect(() => {
        if (selectedToolList.length > 0 && !currentPreviewTool && viewMode === 'preview') {
          setCurrentPreviewTool(selectedToolList[0].uniqueId || selectedToolList[0].id);
        }
      }, [selectedTools, viewMode]);

      return (
        <div className="animate-in h-full flex flex-col">
          <div className="flex items-center gap-3 mb-6 flex-shrink-0">
            <div className="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center">
              <span className="text-blue-600"><Icons.BOOK /></span>
            </div>
            <div>
              <h2 className="text-xl font-bold text-gray-800">1 北京的春节</h2>
            </div>
          </div>

          <div className="flex flex-col flex-1 min-h-0 relative">
            <div className="flex flex-col gap-4 mb-6 flex-shrink-0">
              {/* 工具添加/选择栏 */}
              <div className="bg-white border border-gray-200 rounded-xl p-3 shadow-sm flex items-center gap-4">
                <div className="flex items-center gap-1.5 flex-1 pl-1 flex-wrap">
                  {[
                    {
                      id: 't_lesson_plan', label: '添加教案', icon: 'DOC', color: 'from-cyan-500 to-cyan-600',
                      options: [
                        { subId: 'lp_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'lp_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                        { subId: 'lp_upload', name: '本地上传', mode: 'upload', icon: <Icons.UPLOAD className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_learning_plan', label: '添加学案', icon: 'EDIT', color: 'from-teal-500 to-teal-600',
                      options: [
                        { subId: 'lrp_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'lrp_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                        { subId: 'lrp_upload', name: '本地上传', mode: 'upload', icon: <Icons.UPLOAD className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_ppt', label: '添加课件', icon: 'PPT', color: 'from-blue-500 to-blue-600',
                      options: [
                        { subId: 'ppt_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'ppt_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                        { subId: 'ppt_upload', name: '本地上传', mode: 'upload', icon: <Icons.UPLOAD className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_activity', label: '添加活动', icon: 'GAME', color: 'from-purple-500 to-purple-600',
                      options: [
                        { subId: 'act_template', name: '模板活动', icon: <Icons.GRID className="w-3.5 h-3.5" /> },
                        { subId: 'act_ai', name: 'AI活动', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'act_lottery', name: '趣味抽奖', icon: <Icons.GIFT className="w-3.5 h-3.5" /> }
                      ]
                    },
                    {
                      id: 't_agent', label: '添加智能体', icon: 'AI', color: 'from-indigo-500 to-indigo-600',
                      options: [
                        { subId: 'agent_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'agent_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_dictation', label: '添加听写', icon: 'DICTATION', color: 'from-pink-500 to-pink-600',
                      hidden: catalogSubject === 'math',
                      options: [
                        { subId: 'dict_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'dict_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_oral', label: '口语训练', icon: 'TEACHER', color: 'from-indigo-500 to-indigo-600',
                      hidden: catalogSubject !== 'english',
                      options: [
                        { subId: 'oral_word', name: '单词评测' },
                        { subId: 'oral_dialog', name: '对话评测' },
                        { subId: 'oral_corpus', name: '语料生成' },
                        { subId: 'oral_scene', name: '场景对话' }
                      ]
                    },
                    {
                      id: 't_test', label: '添加随堂测', icon: 'TEST', color: 'from-emerald-500 to-emerald-600',
                      options: [
                        { subId: 'test_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'test_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                      ]
                    },
                    { id: 't_school', label: '添加校本资源', icon: 'DOCS', color: 'from-orange-500 to-orange-600', action: () => { setPreviewModalData({ toolId: 't_school', status: 'completed' }); setOpenDropdown(null); } },
                  ].filter(item => !item.hidden).map(item => {
                    const hasOptions = !!(item.options && item.options.length);
                    const isActive = openDropdown === item.id;

                    return (
                      <div key={item.id} className="relative flex-shrink-0">
                        <button
                          type="button"
                          data-dropdown-trigger={item.id}
                          onClick={(e) => {
                            if (hasOptions) {
                              handleDropdownToggle(item.id, e);
                            } else if (item.action) {
                              item.action();
                            }
                          }}
                          className={`flex items-center gap-1.5 px-2 py-1.5 rounded-lg text-xs transition-colors whitespace-nowrap border ${
                            isActive
                              ? `border-transparent bg-gradient-to-r ${item.color} text-white shadow-sm`
                              : `border-gray-200 bg-gray-50 text-gray-600 hover:bg-gray-100 hover:border-gray-300`
                          }`}
                        >
                          <span className={isActive ? 'text-white' : 'text-gray-500'}>
                            {React.createElement(Icons[item.icon], { className: "w-4 h-4" })}
                          </span>
                          {item.label}
                        </button>
                      </div>
                    );
                  })}
                </div>

                <div className="flex items-center gap-3 pr-2">
                  {isGeneratingAll && (
                    <span className="text-xs text-blue-500 flex items-center gap-1.5 animate-pulse">
                      <Icons.SPARKLE className="w-3.5 h-3.5 animate-spin" />
                      生成中...
                    </span>
                  )}
                  <button
                    onClick={() => setShowPlanModal(true)}
                    disabled={isGeneratingAll}
                    className={`flex items-center gap-2 px-4 py-1.5 rounded-lg font-medium shadow-sm transition-all flex-shrink-0 text-sm ${
                      isGeneratingAll
                        ? 'bg-blue-100 text-blue-500 cursor-wait'
                        : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:shadow-md'
                    }`}
                  >
                    {isGeneratingAll ? (
                      <><Icons.SPARKLE className="w-4 h-4 animate-spin" /> 生成中</>
                    ) : (
                      <><Icons.SPARKLE className="w-4 h-4" /> 一键生成内容</>
                    )}
                  </button>
                </div>

                {/* Fixed 悬浮下拉菜单 — 使用 Portal 渲染到 body，确保不受任何父级 overflow 或 transform 影响 */}
                {openDropdown && (() => {
                  const items = [
                    {
                      id: 't_lesson_plan',
                      options: [
                        { subId: 'lp_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'lp_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                        { subId: 'lp_upload', name: '本地上传', mode: 'upload', icon: <Icons.UPLOAD className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_learning_plan',
                      options: [
                        { subId: 'lrp_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'lrp_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                        { subId: 'lrp_upload', name: '本地上传', mode: 'upload', icon: <Icons.UPLOAD className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_ppt',
                      options: [
                        { subId: 'ppt_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'ppt_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                        { subId: 'ppt_upload', name: '本地上传', mode: 'upload', icon: <Icons.UPLOAD className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_agent',
                      options: [
                        { subId: 'agent_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'agent_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_dictation',
                      hidden: catalogSubject === 'math',
                      options: [
                        { subId: 'dict_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'dict_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_oral',
                      hidden: catalogSubject !== 'english',
                      options: [
                        { 
                          subId: 'oral_word', name: '单词评测', icon: <Icons.MIC className="w-3.5 h-3.5" />,
                          subOptions: [
                            { name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                            { name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> }
                          ]
                        },
                        { 
                          subId: 'oral_dialog', name: '对话评测', icon: <Icons.MIC className="w-3.5 h-3.5" />,
                          subOptions: [
                            { name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                            { name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> }
                          ]
                        },
                        { 
                          subId: 'oral_corpus', name: '语料生成', mode: 'new_tab', icon: <Icons.DOCS className="w-3.5 h-3.5" />
                        },
                        { 
                          subId: 'oral_scene', name: '场景对话', icon: <Icons.MIC className="w-3.5 h-3.5" />,
                          subOptions: [
                            { name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                            { name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> }
                          ]
                        }
                      ]
                    },
                    {
                      id: 't_test',
                      options: [
                        { subId: 'test_ai', name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                        { subId: 'test_config', name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> },
                      ]
                    },
                    {
                      id: 't_activity',
                      options: [
                        { 
                          subId: 'act_template', 
                          name: '模板活动', 
                          icon: <Icons.GRID className="w-3.5 h-3.5" />,
                          subOptions: [
                            { name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                            { name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> }
                          ]
                        },
                        { 
                          subId: 'act_ai', 
                          name: 'AI活动', 
                          icon: <Icons.SPARKLE className="w-3.5 h-3.5" />,
                          subOptions: [
                            { name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                            { name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> }
                          ]
                        },
                        { 
                          subId: 'act_lottery', 
                          name: '趣味抽奖', 
                          icon: <Icons.GIFT className="w-3.5 h-3.5" />,
                          subOptions: [
                            { name: 'AI生成', mode: 'ai', icon: <Icons.SPARKLE className="w-3.5 h-3.5" /> },
                            { name: '手动配置', mode: 'config', icon: <Icons.EDIT className="w-3.5 h-3.5" /> }
                          ]
                        }
                      ]
                    },
                  ].filter(i => !i.hidden);
                  const current = items.find(i => i.id === openDropdown);
                  if (!current) return null;
                  
                  return ReactDOM.createPortal(
                    <div
                      data-dropdown-menu
                      className="fixed bg-white border border-gray-200 rounded-xl shadow-2xl z-[9999] w-48 overflow-visible"
                      style={{ top: dropdownPos.top, left: dropdownPos.left }}
                      onMouseLeave={() => setHoveredActivity(null)}
                    >
                      {current.options.map((opt, index) => (
                        <div key={opt.subId} className="relative group">
                          <button
                            type="button"
                            onMouseEnter={() => {
                              if (opt.subOptions) {
                                setHoveredActivity(opt.subId);
                              } else {
                                setHoveredActivity(null);
                              }
                            }}
                            onClick={() => {
                              if (opt.subOptions) return; // 有二级菜单的点击不触发
                              if (openDropdown.startsWith('t_')) {
                                if (openDropdown === 't_activity') {
                                  toggleTool(opt.subId);
                                } else {
                                  handleAddToolWithMode(openDropdown, opt.mode);
                                }
                              } else {
                                toggleTool(opt.subId);
                              }
                              setOpenDropdown(null);
                            }}
                            className="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-colors flex items-center justify-between"
                          >
                            <div className="flex items-center gap-3">
                              <span className="w-6 h-6 rounded bg-gray-100 text-gray-500 flex items-center justify-center text-xs font-bold flex-shrink-0">
                                {opt.icon ? opt.icon : opt.subId.split('_').map(w => w[0].toUpperCase()).join('')}
                              </span>
                              {opt.name}
                            </div>
                            {opt.subOptions && <Icons.CHEVRON_RIGHT className="w-3.5 h-3.5 text-gray-400" />}
                          </button>

                          {/* 二级菜单 */}
                          {hoveredActivity === opt.subId && opt.subOptions && (
                            <div 
                              className="absolute left-full top-0 ml-0.5 w-40 bg-white border border-gray-200 rounded-xl shadow-2xl overflow-hidden py-1"
                              onMouseEnter={() => setHoveredActivity(opt.subId)}
                            >
                              {opt.subOptions.map(subOpt => (
                                <button
                                  key={subOpt.name}
                                  type="button"
                                  onClick={() => {
                                    handleAddToolWithMode(opt.subId, subOpt.mode);
                                    setOpenDropdown(null);
                                    setHoveredActivity(null);
                                  }}
                                  className="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-colors flex items-center gap-3"
                                >
                                  <span className="text-gray-400">{subOpt.icon}</span>
                                  {subOpt.name}
                                </button>
                              ))}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>,
                    document.body
                  );
                })()}

                {/* 卡片功能菜单 — 使用 Portal 渲染 */}
                {activeCardMenu && (() => {
                  const targetTool = selectedToolList.find(t => t.uniqueId === activeCardMenu);
                  if (!targetTool) return null;
                  
                  const toolId = targetTool.id;
                  let menuItems = [];
                  
                  if (toolId === 't_lesson_plan' || toolId === 't_learning_plan' || toolId === 't_ppt') {
                    menuItems = [
                      { label: '编辑', icon: <Icons.EDIT className="w-3.5 h-3.5" />, action: () => handleOpenToolPreview(targetTool.uniqueId, targetTool.id, 'config') },
                      { label: '重命名', icon: <Icons.DOCS className="w-3.5 h-3.5" />, action: () => alert('重命名功能开发中...') },
                      { label: '下载', icon: <Icons.UPLOAD className="w-3.5 h-3.5" />, action: () => alert('下载功能开发中...') },
                      { label: '共享', icon: <Icons.SEND className="w-3.5 h-3.5" />, action: () => alert('共享功能开发中...') },
                      { label: '删除', icon: <Icons.CLOSE className="w-3.5 h-3.5" />, action: () => removeTool(targetTool.uniqueId), danger: true },
                    ];
                  } else if (toolId === 't_dictation' || toolId === 't_oral') {
                    menuItems = [
                      { label: '编辑', icon: <Icons.EDIT className="w-3.5 h-3.5" />, action: () => handleOpenToolPreview(targetTool.uniqueId, targetTool.id, 'config') },
                      { label: '共享', icon: <Icons.SEND className="w-3.5 h-3.5" />, action: () => alert('共享功能开发中...') },
                      { label: '删除', icon: <Icons.CLOSE className="w-3.5 h-3.5" />, action: () => removeTool(targetTool.uniqueId), danger: true },
                    ];
                  } else if (toolId.startsWith('act_')) {
                    menuItems = [
                      { label: '编辑', icon: <Icons.EDIT className="w-3.5 h-3.5" />, action: () => handleOpenToolPreview(targetTool.uniqueId, targetTool.id, 'config') },
                      { label: '删除', icon: <Icons.CLOSE className="w-3.5 h-3.5" />, action: () => removeTool(targetTool.uniqueId), danger: true },
                    ];
                  } else if (toolId === 't_agent') {
                    menuItems = [
                      { label: '删除', icon: <Icons.CLOSE className="w-3.5 h-3.5" />, action: () => removeTool(targetTool.uniqueId), danger: true },
                    ];
                  } else {
                    // 默认菜单
                    menuItems = [
                      { label: '编辑', icon: <Icons.EDIT className="w-3.5 h-3.5" />, action: () => handleOpenToolPreview(targetTool.uniqueId, targetTool.id, 'config') },
                      { label: '删除', icon: <Icons.CLOSE className="w-3.5 h-3.5" />, action: () => removeTool(targetTool.uniqueId), danger: true },
                    ];
                  }

                  return ReactDOM.createPortal(
                    <div
                      data-dropdown-menu
                      className="fixed bg-white border border-gray-100 rounded-xl shadow-2xl z-[9999] w-40 overflow-hidden py-1.5 animate-in fade-in zoom-in-95 duration-100"
                      style={{ top: cardMenuPos.top, left: cardMenuPos.left }}
                    >
                      {menuItems.map((item, idx) => (
                        <button
                          key={idx}
                          type="button"
                          onClick={() => {
                            item.action();
                            setActiveCardMenu(null);
                          }}
                          className={`w-full text-left px-4 py-2 text-sm transition-colors flex items-center gap-2.5 ${
                            item.danger 
                              ? 'text-red-500 hover:bg-red-50' 
                              : 'text-gray-600 hover:bg-gray-50 hover:text-blue-600'
                          }`}
                        >
                          <span className={item.danger ? 'text-red-400' : 'text-gray-400'}>{item.icon}</span>
                          {item.label}
                        </button>
                      ))}
                    </div>,
                    document.body
                  );
                })()}
              </div>
            </div>

            {selectedToolList.length === 0 ? (
              <div className="bg-gray-50 border border-gray-200 rounded-2xl p-10 text-center flex-1 flex flex-col items-center justify-center">
                <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-100 flex items-center justify-center">
                  <span className="text-gray-400 text-2xl"><Icons.GRID /></span>
                </div>
                <h3 className="text-gray-700 font-medium mb-2">尚未选择任何工具</h3>
                <p className="text-gray-400 text-sm">请点击上方栏的工具标签添加到当前任务中</p>
              </div>
            ) : (
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 overflow-y-auto pb-6">
                {selectedToolList.map((tool) => {
                  const uniqueId = tool.uniqueId;
                  const status = generationStatus[uniqueId] || 'idle';
                  return (
                    <div
                      key={uniqueId}
                      onClick={() => {
                        if (status === 'completed') {
                          handleOpenToolPreview(uniqueId, tool.id);
                        }
                      }}
                      className={`bg-white border rounded-xl p-4 shadow-sm transition-all flex flex-col relative overflow-hidden text-left min-h-[140px] ${
                        status === 'generating' 
                          ? 'border-blue-300 shadow-blue-100/50 cursor-wait' 
                          : status === 'completed'
                            ? 'border-gray-200 hover:shadow-md hover:border-blue-300 cursor-pointer group'
                            : 'border-gray-200 opacity-90'
                      }`}
                    >
                      {/* 右上角：生成中状态 */}
                      {status === 'generating' && (
                        <div className="absolute top-3 right-3 flex items-center gap-1 text-[11px] text-blue-500 bg-blue-50 px-2 py-1 rounded-full z-10">
                          <Icons.SPARKLE className="w-3 h-3 animate-spin" /> <span>生成中...</span>
                        </div>
                      )}

                      {/* 左上角：图标 + 类型标签 + 时间 */}
                      <div className="flex items-start gap-3 w-full pr-8">
                        <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-white flex-shrink-0 shadow-sm ${
                          status === 'generating' ? 'bg-blue-400 animate-pulse' : `bg-gradient-to-br ${tool.color}`
                        }`}>
                          {React.createElement(Icons[tool.icon], { className: "w-5 h-5" })}
                        </div>
                        
                        <div className="flex flex-col flex-1 overflow-hidden pt-0.5">
                          <span className="text-sm font-bold text-gray-800">
                            {(() => {
                                const id = tool.parentId || tool.id;
                                if (id.startsWith('t_ppt')) return '课件';
                                if (id === 't_lesson_plan') return '教案';
                                if (id === 't_learning_plan') return '学案';
                                if (id === 't_activity' || id.startsWith('act_')) return '课堂活动';
                                if (id === 't_agent') return '智能体';
                                if (id === 't_test') return '随堂测';
                                if (id === 't_dictation') return '听写';
                                if (id === 't_oral' || id.startsWith('oral_')) return '口语训练';
                                return '工具';
                              })()}
                          </span>
                          
                          {/* 标签下：状态/时间 */}
                          {status === 'completed' && (
                            <span className="text-[11px] text-gray-400 mt-0.5 whitespace-nowrap">
                              {(() => {
                                const d = new Date(tool.createdAt || Date.now());
                                const pad = n => n.toString().padStart(2, '0');
                                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                              })()}
                            </span>
                          )}
                          {status === 'generating' && (
                            <span className="text-[11px] text-gray-400 mt-0.5 whitespace-nowrap">
                              正在为您准备内容
                            </span>
                          )}
                          {status === 'idle' && (
                            <span className="text-[11px] text-gray-400 mt-0.5 whitespace-nowrap">未生成</span>
                          )}
                        </div>
                      </div>
                      
                      {/* 再往下：卡片名称 */}
                      <div className="mt-3 mb-4">
                        <h4 className="font-medium text-gray-800 text-[13px] leading-snug line-clamp-2" title={tool.parentName ? `${tool.parentName} · ${tool.name}` : tool.name}>
                          {tool.parentName ? `${tool.parentName} · ` : ''}{tool.name}
                        </h4>
                      </div>
                      
                      {/* 右下角：操作按钮 */}
                      <div className="mt-auto flex items-center justify-end gap-2 w-full">
                        {status === 'generating' ? null : status === 'completed' ? (
                          <button
                            type="button"
                            data-card-menu-trigger={uniqueId}
                            onClick={(e) => handleCardMenuToggle(uniqueId, e)}
                            className={`p-1.5 rounded-lg transition-colors ${
                              activeCardMenu === uniqueId ? 'bg-blue-50 text-blue-600' : 'text-gray-400 hover:bg-gray-100 hover:text-gray-600'
                            }`}
                            title="更多操作"
                          >
                            <Icons.DOTS className="w-5 h-5" />
                          </button>
                        ) : (tool.id === 't_ppt' || tool.id === 't_lesson_plan' || tool.id === 't_learning_plan') ? (
                          <div className="flex gap-2 relative">
                            <input 
                              type="file" 
                              id={`upload-${uniqueId}`}
                              className="hidden" 
                              accept={tool.id === 't_ppt' ? ".ppt,.pptx" : ".doc,.docx,.pdf"}
                              onChange={(e) => {
                                if (e.target.files && e.target.files.length > 0) {
                                  handleSingleGenerate(uniqueId, { stopPropagation: () => {} });
                                }
                              }}
                            />
                            <button
                              onClick={(e) => handleSingleGenerate(uniqueId, e)}
                              className="px-2 py-1.5 bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-600 hover:text-blue-700 rounded-md text-xs font-medium flex items-center gap-1 transition-colors"
                            >
                              <Icons.SPARKLE className="w-3 h-3" /> AI生成
                            </button>
                            <button
                              onClick={(e) => {
                                e.stopPropagation();
                                handleOpenToolPreview(uniqueId, tool.id, 'config');
                              }}
                              className="px-2 py-1.5 bg-white border border-blue-200 text-blue-600 hover:bg-blue-50 hover:border-blue-300 rounded-md text-xs font-medium flex items-center gap-1 transition-colors"
                            >
                              <Icons.EDIT className="w-3 h-3" /> 配置
                            </button>
                            <button
                              onClick={(e) => {
                                e.stopPropagation();
                                document.getElementById(`upload-${uniqueId}`).click();
                              }}
                              className="px-2 py-1.5 bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 hover:border-gray-300 rounded-md text-xs font-medium flex items-center gap-1 transition-colors"
                            >
                              <Icons.UPLOAD className="w-3 h-3" /> 本地上传
                            </button>
                          </div>
                        ) : (
                          <>
                            <button
                              onClick={(e) => handleSingleGenerate(uniqueId, e)}
                              className="px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors border bg-white border-blue-200 text-blue-600 hover:bg-blue-50 hover:border-blue-300"
                            >
                              <Icons.SPARKLE className="w-3 h-3" /> AI 生成
                            </button>
                            
                            <button
                              onClick={(e) => {
                                e.stopPropagation();
                                handleOpenToolPreview(uniqueId, tool.id, tool.id === 't_test' ? 'config' : null);
                              }}
                              className="px-3 py-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-600 hover:text-gray-800 rounded-md text-xs font-medium flex items-center gap-1.5 transition-colors"
                            >
                              <Icons.EDIT className="w-3 h-3" /> 配置
                            </button>
                          </>
                        )}
                      </div>
                      
                      {/* 生成中的遮罩层动画 */}
                      {status === 'generating' && (
                        <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full animate-[shimmer_1.5s_infinite]" />
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* 授课方式选择弹窗 */}
          {showPlanModal && ReactDOM.createPortal(
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[10000] flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                <div className="px-8 py-6 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
                  <div>
                    <h2 className="text-2xl font-bold text-gray-800">选择授课方式及互动工具</h2>
                    <p className="text-gray-500 text-sm mt-1">系统预设了两种常用授课方案，您也可以在下方自由组合需要的课中工具</p>
                  </div>
                  <button
                    onClick={() => setShowPlanModal(false)}
                    className="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-600 transition-colors"
                  >
                    <Icons.CLOSE className="w-5 h-5" />
                  </button>
                </div>
                
                <div className="p-8 overflow-y-auto flex-1">
                  <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-8 flex items-start gap-3">
                    <span className="text-blue-500 mt-0.5"><Icons.BULB className="w-5 h-5" /></span>
                    <p className="text-sm text-blue-700 leading-relaxed">
                      <strong>💡 提示：</strong> 确认添加后，AI 将根据您的课程内容（1 北京的春节）自动一键生成所有选中的教学互动内容，无需手动配置。
                    </p>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    {/* 方案一：标准授课 */}
                    <div
                      className={`group cursor-pointer border-2 rounded-2xl p-6 transition-all duration-200 ${
                        JSON.stringify([...modalSelectedTools].sort()) === JSON.stringify(['t_lesson_plan', 't_learning_plan', 't_ppt', 't_test'].sort())
                          ? 'border-blue-500 bg-blue-50 shadow-md'
                          : 'border-gray-200 bg-white hover:border-blue-400 hover:shadow-md'
                      }`}
                      onClick={() => setModalSelectedTools(['t_lesson_plan', 't_learning_plan', 't_ppt', 't_test'])}
                    >
                      <div className="flex items-center gap-3 mb-4">
                        <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center text-white">
                          <Icons.PPT className="w-6 h-6" />
                        </div>
                        <div>
                          <h3 className="text-lg font-bold text-gray-800">标准授课方案</h3>
                          <p className="text-xs text-gray-500">适合传统课堂</p>

    }
    function ToolPreviewPage({ toolId, status, instanceId, mode: propMode, onClose }) {
      const [activeSlideIndex, setActiveSlideIndex] = useState(0);
      const urlParams = new URLSearchParams(window.location.search);
      const mode = propMode || urlParams.get('mode');
      const isModal = typeof onClose === 'function';

      const handleClose = () => {
        if (isModal) onClose();
        else window.close();
      };

      const handleComplete = (type) => {
        if (isModal) {
          window.postMessage({ type, instanceId, toolId }, window.location.origin);
          onClose();
        } else {
          const opener = window.opener;
          if (opener && instanceId) {
            opener.postMessage({ type, instanceId, toolId }, window.location.origin);
          }
          window.close();
        }
      };

      const studyGuideSlides = Array.from({ length: 13 }, (_, i) => ({
        type: 'image',
        title: `交互课件截图 ${i + 1}`,
        url: `book/北京的春节${i + 1}.png`
      }));

      let tool = MOCK_DATA.inClassTools.find(t => t.id === toolId);
      if (!tool) {
        for (const t of MOCK_DATA.inClassTools) {
          if (t.options) {
            const opt = t.options.find(o => o.subId === toolId);
            if (opt) {
              tool = { ...t, id: opt.subId, name: opt.name, parentId: t.id, parentName: t.name };
              break;
            }
          }
        }
      }
      
      if (!tool) {
        if (toolId === 't_ppt' || toolId?.startsWith('t_ppt')) {
          tool = { id: 't_ppt', name: '课件', icon: 'PPT', color: 'from-blue-500 to-blue-600' };
        } else if (toolId?.startsWith('act_')) {
          tool = { id: toolId, name: '课堂活动', icon: 'GAME', color: 'from-purple-500 to-purple-600' };
        } else if (toolId === 't_agent') {
          tool = { id: 't_agent', name: '智能体', icon: 'AI', color: 'from-indigo-500 to-indigo-600' };
        } else if (toolId === 't_test') {
          tool = { id: 't_test', name: '随堂测', icon: 'TEST', color: 'from-emerald-500 to-emerald-600' };
        } else if (toolId === 't_school') {
          tool = { id: 't_school', name: '校本资源', icon: 'DOCS', color: 'from-orange-500 to-orange-600' };

    function StepPostClass({ wizardMode }) {
      const [activeTab, setActiveTab] = useState('作业');
      const [loading, setLoading] = useState(wizardMode === 'new');
      const [showModal, setShowModal] = useState(false);
      const [homeworkTab, setHomeworkTab] = useState('A');
      const [previewHomework, setPreviewHomework] = useState(null);
      const [isAssigned, setIsAssigned] = useState(false);
      const [showAnalysisModal, setShowAnalysisModal] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);

      const [levelData, setLevelData] = useState(() => {
        const initialData = JSON.parse(JSON.stringify(MOCK_DATA.postClassHomework));
        Object.keys(initialData).forEach(key => {
          initialData[key].students = [];
        });
        return initialData;
      });
      const [draggedStudent, setDraggedStudent] = useState(null);

      useEffect(() => {
        if (wizardMode === 'new') {
          const timer = setTimeout(() => {
            setLoading(false);
          }, 1500);
          return () => clearTimeout(timer);
        }
      }, [wizardMode]);

      const handlePublish = () => {
        alert('✅ 教学任务已发布！');
      };

      const handleDragStart = (e, student, sourceLevel) => {
        setDraggedStudent({ student, sourceLevel });
        e.dataTransfer.effectAllowed = 'move';
        // 设置半透明拖拽效果
        e.currentTarget.style.opacity = '0.5';
      };

      const handleDragEnd = (e) => {
        e.currentTarget.style.opacity = '1';
        setDraggedStudent(null);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      };

      const handleDrop = (e, targetLevel) => {
        e.preventDefault();
        if (!draggedStudent || draggedStudent.sourceLevel === targetLevel) return;

        setLevelData(prev => {
          const newData = { ...prev };
          const sourceLevelData = { ...newData[draggedStudent.sourceLevel] };
          const targetLevelData = { ...newData[targetLevel] };

          // 从源层次中移除学生
          sourceLevelData.students = sourceLevelData.students.filter(s => s.id !== draggedStudent.student.id);
          // 添加到目标层次
          targetLevelData.students = [...targetLevelData.students, draggedStudent.student];

          newData[draggedStudent.sourceLevel] = sourceLevelData;
          newData[targetLevel] = targetLevelData;

          return newData;
        });
        setDraggedStudent(null);
      };

    // ─── 废弃代码清理（原旧版组件） ────────────────────────────────────────────
    function StepInClassTools({ selectedTools, setSelectedTools }) {
      const planA = ['t1','t9'];
      const planB = ['t1','t4','t5','t8','t9'];
      const [selectedPlan, setSelectedPlan] = useState(null);

      const applyPlan = (plan) => {
        setSelectedPlan(plan);
        const planTools = plan === 'A' ? planA : planB;
        setSelectedTools(planTools.map(id => ({ id, instanceId: `${id}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}` })));
      };

      const toggleTool = (id) => {
        const instanceId = `${id}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        setSelectedTools([...selectedTools, { id, instanceId }]);
      };

      return (
        <div className="animate-in">
          <div className="flex items-center gap-3 mb-6">
            <div className="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center">
              <span className="text-purple-600"><Icons.LAYERS /></span>
            </div>
            <div>
              <h2 className="text-xl font-semibold text-gray-800">Step 2 · 课中教学工具配置</h2>
              <p className="text-sm text-gray-500">选择适合本节课的课堂互动工具组合</p>
            </div>
          </div>

          {/* 方案选择 */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
            {[
              { id: 'A', name: '核心精简版', desc: '适合常规教学，快速高效', tools: planA, toolNames: ['课件','随堂测'], color: 'blue' },
              { id: 'B', name: '全场景互动版', desc: '适合公开课/示范课，氛围活跃', tools: planB, toolNames: ['课件','课堂活动','智能听写','趣味抽奖','随堂测'], color: 'purple' },
            ].map(plan => (
              <div
                key={plan.id}
                onClick={() => applyPlan(plan.id)}
                className={`relative cursor-pointer rounded-2xl border-2 p-5 transition-all duration-200 ${
                  selectedPlan === plan.id
                    ? plan.color === 'blue' ? 'border-blue-400 bg-blue-50 shadow-card-hover' : 'border-purple-400 bg-purple-50 shadow-card-hover'
                    : 'border-gray-200 bg-white hover:border-gray-300 hover:shadow-md'
                }`}
              >
                <div className="flex items-center gap-3 mb-2">
                  <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold ${
                    selectedPlan === plan.id
                      ? plan.color === 'blue' ? 'bg-blue-500' : 'bg-purple-500'
                      : 'bg-gray-300'
                  }`}>
                    {plan.id === 'A' ? '⚡' : '🎯'}
                  </div>
                  <div>
                    <h3 className="font-semibold text-gray-800">{plan.name}</h3>
                    <p className="text-xs text-gray-500">{plan.desc}</p>
                  </div>
                  {selectedPlan === plan.id && (
                    <span className="ml-auto text-green-500"><Icons.CHECK_CIRCLE /></span>
                  )}
                </div>
                <div className="flex flex-wrap gap-1 mt-2">
                  {plan.toolNames.map(n => (
                    <span key={n} className="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full">{n}</span>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {/* 工具网格 */}
          <div className="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
            <h4 className="text-sm font-medium text-gray-600 mb-3 flex items-center gap-2">
              <span className="text-gray-400"><Icons.GRID /></span>
              所有可用工具（点击切换选中状态）
            </h4>
            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-11 gap-2">
              {MOCK_DATA.inClassTools.map(tool => {
                // 暂时注释掉选中状态样式，因为现在是纯添加模式
                // const isSelected = selectedTools.has(tool.id);
                return (
                  <div
                    key={tool.id}
                    onClick={() => toggleTool(tool.id)}

                  >
                    <span className="text-gray-500">{React.createElement(Icons[tool.icon])}</span>
                    <span className="text-xs font-medium text-gray-600">{tool.name}</span>
                  </div>
                );
              })}
            </div>
            <div className="mt-3 flex items-center gap-2 text-xs text-gray-500">
              <span>已选 <span className="font-semibold text-blue-600">{selectedTools.length}</span> 个工具</span>
              <span className="text-gray-300">|</span>
              <span className="text-gray-400">点击工具卡片可自定义增删</span>
            </div>
          </div>
